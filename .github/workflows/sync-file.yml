name: Build LaTeX PDF

on:
  push:
    branches:
      - main
    paths-ignore:
      - files/CV_NIU_Xuezhi.pdf

  pull_request:
    branches:
      - main
    paths-ignore:
      - files/CV_NIU_Xuezhi.pdf

  workflow_dispatch:

# Only one PDF build for the same branch may run at a time.
# A newer push cancels an older build.
concurrency:
  group: build-latex-pdf-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          texlive_version: 2026
          latexmk_use_xelatex: true

      - name: Prepare generated PDF
        run: |
          mkdir -p files
          cp main.pdf files/CV_NIU_Xuezhi.pdf

      - name: Commit generated PDF
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          # Verify that main has not changed since this workflow started.
          git fetch origin main

          REMOTE_SHA="$(git rev-parse origin/main)"

          if [ "$REMOTE_SHA" != "$GITHUB_SHA" ]; then
            echo "Remote main advanced while this workflow was running."
            echo "Current workflow source: $GITHUB_SHA"
            echo "Current remote main:    $REMOTE_SHA"
            echo "Skipping publication of a potentially outdated PDF."
            exit 0
          fi

          git add files/CV_NIU_Xuezhi.pdf

          if git diff --cached --quiet; then
            echo "Generated PDF is unchanged."
            exit 0
          fi

          git commit -m "Update generated CV PDF [skip ci]"

          # A push can still occur between the revision check and this command.
          if ! git push origin HEAD:main; then
            git fetch origin main

            if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
              echo "Remote main advanced during the final push."
              echo "A newer workflow run will publish the corresponding PDF."
              exit 0
            fi

            echo "Push failed for a reason other than a normal branch update."
            exit 1
          fi
     
