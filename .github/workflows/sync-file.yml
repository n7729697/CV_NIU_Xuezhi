name: Build LaTeX PDF

on:
  push:
    branches:
      - main
    paths-ignore:
      - files/CV_NIU_Xuezhi.pdf

  pull_request:
    branches:
      - main
    paths-ignore:
      - files/CV_NIU_Xuezhi.pdf

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          texlive_version: 2026
          latexmk_use_xelatex: true

      - name: Prepare generated PDF
        run: |
          mkdir -p files
          cp main.pdf files/CV_NIU_Xuezhi.pdf

      # Pull requests should compile the document but should not modify
      # either the pull-request branch or the main branch.
      - name: Commit generated PDF
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add files/CV_NIU_Xuezhi.pdf

          if git diff --cached --quiet; then
            echo "Generated PDF is unchanged."
            exit 0
          fi

          git commit -m "Update generated CV PDF [skip ci]"
          git push
     
